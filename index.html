<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Video Editor Pro - High Volume TTS + Kamera Back</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, sans-serif; background: #0a0f1e; color: white; display: flex; justify-content: center; padding: 16px; margin: 0; }
        .container { background: #1a1f2e; padding: 20px; border-radius: 28px; width: 100%; max-width: 650px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #00e5ff; margin: 0; }
        .sub { text-align: center; font-size: 12px; color: #88aaff; margin-bottom: 20px; }
        .label { font-weight: 600; margin: 12px 0 5px; font-size: 14px; color: #b9e6ff; }
        textarea, input[type="file"], select { width: 100%; border-radius: 16px; padding: 12px; background: #10131f; border: 1px solid #333; color: white; margin-bottom: 10px; }
        button { width: 100%; padding: 14px; background: #00e5ff; border: none; border-radius: 50px; font-weight: bold; font-size: 16px; color: #000; margin-top: 10px; cursor: pointer; transition: 0.2s; }
        button:disabled { background: #444; color: #888; }
        .status { background: #0e1120; border-radius: 20px; padding: 12px; text-align: center; font-size: 13px; margin: 15px 0; border-left: 4px solid #00e5ff; }
        .download-link { display: block; background: #22c55e; color: white; text-align: center; padding: 15px; border-radius: 50px; text-decoration: none; font-weight: bold; margin: 10px 0; }
        .volume-control { display: flex; gap: 12px; align-items: center; margin: 10px 0; background: #0e1120; padding: 8px 12px; border-radius: 40px; }
        .volume-control label { font-size: 13px; flex: 1; }
        input[type="range"] { flex: 2; height: 4px; border-radius: 10px; background: #333; }
        .note { font-size: 11px; color: #aaa; text-align: center; margin-top: 8px; }
        hr { border: 0.5px solid #333; margin: 25px 0; }
        .btn-group { display: flex; gap: 10px; margin-top: 5px; }
        .btn-group button { margin-top: 0; background: #2c3e66; color: white; }
        .btn-group button:active { background: #1e2a4a; }
        .preview-video-small { width: 100%; border-radius: 16px; margin-top: 10px; background: #000; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎬 Video Editor Pro</h2>
    <div class="sub">Suara SUPER KERAS + Rekam/Upload Video</div>

    <div class="label">🗣️ 1. Buat Suara (Volume Boost Maksimal)</div>
    <textarea id="ttsText" rows="2" placeholder="Ketik teks di sini... contoh: Halo, ini video dengan suara paling keras dan jelas!"></textarea>
    
    <div class="volume-control">
        <label>🔊 Gain Suara TTS:</label>
        <input type="range" id="ttsGainSlider" min="2.5" max="8.5" step="0.2" value="6.0">
        <span id="gainValueDisplay" style="min-width: 45px;">6.0x</span>
    </div>
    
    <button id="generateTTSBtn">🎤 GENERATE & PERKERAS SUARA (EXTREME)</button>
    
    <div id="downloadArea" style="display:none;">
        <div class="label">🎧 Preview Hasil (Suara SUPER KERAS):</div>
        <audio id="audioPreview" controls style="width:100%; margin-bottom:10px;"></audio>
        <a id="ttsDownloadBtn" class="download-link">💾 SIMPAN SUARA (WAV)</a>
    </div>

    <hr>

    <div class="label">📹 2. Pilih Sumber Video</div>
    <div class="btn-group">
        <button id="selectFileBtn" style="background:#2c3e66;">📁 Pilih dari File Manager</button>
        <button id="openCameraBtn" style="background:#2c3e66;">🎥 Rekam Kamera Belakang</button>
    </div>
    <input type="file" id="videoInput" accept="video/*" style="display:none;">
    <div id="videoPreviewArea" style="margin-top: 10px;"></div>

    <div class="label">🎵 3. Upload File Suara (Hasil Step 1)</div>
    <input type="file" id="audioInput" accept="audio/*">

    <div class="label">✏️ Teks Overlay</div>
    <textarea id="overlayText" placeholder="Teks yang muncul di video..."></textarea>

    <div class="volume-control">
        <label>🎚️ Volume Akhir di Video:</label>
        <input type="range" id="finalVolumeBoost" min="2.0" max="7.0" step="0.2" value="4.8">
        <span id="finalVolDisplay">4.8x</span>
    </div>

    <button id="processBtn" style="background:#ffaa33;" disabled>✨ GABUNGKAN VIDEO + AUDIO MAKSIMAL ✨</button>
    
    <div id="finalOutput" style="display:none; margin-top:20px;">
        <video id="outputVideo" controls style="width:100%; border-radius:15px;"></video>
        <a id="finalDownload" class="download-link" style="background:#22c55e;">💾 DOWNLOAD VIDEO FINAL</a>
    </div>
</div>

<canvas id="mainCanvas" style="display:none;"></canvas>

<script>
    (function() {
        // DOM Elements
        const ttsText = document.getElementById('ttsText');
        const generateTTSBtn = document.getElementById('generateTTSBtn');
        const ttsStatus = document.getElementById('ttsStatus');
        const audioPreview = document.getElementById('audioPreview');
        const ttsDownloadBtn = document.getElementById('ttsDownloadBtn');
        const downloadArea = document.getElementById('downloadArea');
        const ttsGainSlider = document.getElementById('ttsGainSlider');
        const gainValueDisplay = document.getElementById('gainValueDisplay');
        
        const videoInput = document.getElementById('videoInput');
        const audioInput = document.getElementById('audioInput');
        const processBtn = document.getElementById('processBtn');
        const selectFileBtn = document.getElementById('selectFileBtn');
        const openCameraBtn = document.getElementById('openCameraBtn');
        const finalVolumeBoost = document.getElementById('finalVolumeBoost');
        const finalVolDisplay = document.getElementById('finalVolDisplay');
        
        let selectedVideo = null;
        let selectedAudio = null;
        let currentAmplifiedBlob = null;
        
        finalVolumeBoost.addEventListener('input', () => {
            finalVolDisplay.innerText = parseFloat(finalVolumeBoost.value).toFixed(1) + 'x';
        });
        
        ttsGainSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            gainValueDisplay.innerText = val.toFixed(1) + 'x';
        });
        
        // ========== FILE MANAGER ==========
        selectFileBtn.onclick = () => {
            videoInput.click();
        };
        
        videoInput.onchange = (e) => {
            if (e.target.files.length > 0) {
                selectedVideo = e.target.files[0];
                showVideoPreview(selectedVideo);
                checkReady();
            }
        };
        
        // ========== KAMERA BELAKANG (VIDEO MODE) ==========
        openCameraBtn.onclick = async () => {
            try {
                // Prioritaskan kamera belakang (environment)
                const constraints = {
                    video: { facingMode: { exact: "environment" } },
                    audio: false
                };
                let stream;
                try {
                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                } catch (err) {
                    // fallback ke kamera apa saja
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                }
                
                // Buat elemen video untuk preview & rekam
                const previewDiv = document.getElementById('videoPreviewArea');
                previewDiv.innerHTML = `<video id="cameraPreview" autoplay playsinline style="width:100%; border-radius:16px; background:#000;"></video>
                                        <div style="display:flex; gap:12px; margin-top:10px;">
                                            <button id="startRecordBtn" style="background:#00e5ff;">🔴 Mulai Rekam</button>
                                            <button id="stopRecordBtn" style="background:#555;" disabled>⏹️ Stop & Gunakan</button>
                                        </div>`;
                const cameraVideo = document.getElementById('cameraPreview');
                cameraVideo.srcObject = stream;
                
                let mediaRecorder;
                let recordedChunks = [];
                
                const startBtn = document.getElementById('startRecordBtn');
                const stopBtn = document.getElementById('stopRecordBtn');
                
                startBtn.onclick = () => {
                    recordedChunks = [];
                    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) recordedChunks.push(e.data);
                    };
                    mediaRecorder.onstop = () => {
                        const videoBlob = new Blob(recordedChunks, { type: 'video/webm' });
                        selectedVideo = new File([videoBlob], `kamera_${Date.now()}.webm`, { type: 'video/webm' });
                        showVideoPreview(selectedVideo);
                        checkReady();
                        // hentikan semua track kamera
                        stream.getTracks().forEach(track => track.stop());
                        previewDiv.innerHTML = `<div class="status" style="background:#164e2c;">✅ Video tersimpan! Siap diproses.</div>`;
                        setTimeout(() => {
                            if (previewDiv.firstChild) previewDiv.innerHTML = '';
                        }, 2000);
                    };
                    mediaRecorder.start();
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                };
                
                stopBtn.onclick = () => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                    startBtn.disabled = true;
                    stopBtn.disabled = true;
                };
                
            } catch (err) {
                alert("Gagal mengakses kamera. Pastikan izin diberikan.");
                console.error(err);
            }
        };
        
        function showVideoPreview(file) {
            const url = URL.createObjectURL(file);
            const previewArea = document.getElementById('videoPreviewArea');
            previewArea.innerHTML = `<video src="${url}" controls style="width:100%; border-radius:16px; max-height:200px;"></video>`;
        }
        
        audioInput.onchange = (e) => { 
            if (e.target.files.length > 0) {
                selectedAudio = e.target.files[0];
                checkReady();
            }
        };
        
        function checkReady() { 
            processBtn.disabled = !(selectedVideo && selectedAudio); 
        }
        
        // ========== AMPLIFIKASI AUDIO BUFFER ==========
        async function amplifyAudioBuffer(audioContext, sourceBuffer, gainFactor) {
            const numberOfChannels = sourceBuffer.numberOfChannels;
            const length = sourceBuffer.length;
            const newBuffer = audioContext.createBuffer(numberOfChannels, length, sourceBuffer.sampleRate);
            
            for (let channel = 0; channel < numberOfChannels; channel++) {
                const inputData = sourceBuffer.getChannelData(channel);
                const outputData = newBuffer.getChannelData(channel);
                for (let i = 0; i < length; i++) {
                    let val = inputData[i] * gainFactor;
                    // soft limiting biar tidak terlalu pecah tapi tetap keras
                    if (val > 0.98) val = 0.98;
                    if (val < -0.98) val = -0.98;
                    outputData[i] = val;
                }
            }
            return newBuffer;
        }
        
        function audioBufferToWav(buffer) {
            const numChannels = buffer.numberOfChannels;
            const sampleRate = buffer.sampleRate;
            const bitDepth = 16;
            let samples = buffer.getChannelData(0);
            if (numChannels > 1) {
                let interleaved = new Float32Array(samples.length * numChannels);
                for (let i = 0; i < samples.length; i++) {
                    for (let ch = 0; ch < numChannels; ch++) {
                        interleaved[i * numChannels + ch] = buffer.getChannelData(ch)[i];
                    }
                }
                samples = interleaved;
            }
            const dataLength = samples.length * (bitDepth / 8);
            const bufferLength = 44 + dataLength;
            const arrayBuffer = new ArrayBuffer(bufferLength);
            const view = new DataView(arrayBuffer);
            
            function writeString(offset, str) {
                for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
            }
            writeString(0, 'RIFF');
            view.setUint32(4, bufferLength - 8, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * numChannels * (bitDepth / 8), true);
            view.setUint16(32, numChannels * (bitDepth / 8), true);
            view.setUint16(34, bitDepth, true);
            writeString(36, 'data');
            view.setUint32(40, dataLength, true);
            
            let offset = 44;
            for (let i = 0; i < samples.length; i++, offset += 2) {
                let s = Math.max(-1, Math.min(1, samples[i]));
                s = s < 0 ? s * 0x8000 : s * 0x7FFF;
                view.setInt16(offset, s, true);
            }
            return new Blob([view], { type: 'audio/wav' });
        }
        
        // ========== GENERATE TTS DENGAN REKAMAN MIKROFON + POST GAIN ==========
        generateTTSBtn.onclick = async () => {
            const txt = ttsText.value.trim();
            if (!txt) {
                ttsStatus.innerText = "⚠️ Masukkan teks terlebih dahulu.";
                return;
            }
            generateTTSBtn.disabled = true;
            ttsStatus.innerText = "🎙️ Merekam & Memperkeras suara (proses extreme gain)...";
            window.speechSynthesis.cancel();
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                const preGain = audioCtx.createGain();
                const recordGainValue = parseFloat(ttsGainSlider.value);
                preGain.gain.value = recordGainValue; // pre-amplify langsung saat rekam
                const dest = audioCtx.createMediaStreamDestination();
                source.connect(preGain);
                preGain.connect(dest);
                
                const mediaRecorder = new MediaRecorder(dest.stream, { mimeType: 'audio/webm' });
                const chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                
                const recordingDone = new Promise((resolve) => {
                    mediaRecorder.onstop = async () => {
                        const rawBlob = new Blob(chunks, { type: 'audio/webm' });
                        const arrayBuf = await rawBlob.arrayBuffer();
                        const procCtx = new AudioContext();
                        let audioBuffer = await procCtx.decodeAudioData(arrayBuf);
                        // POST GAIN: tambahan faktor 2.2 supaya super keras
                        const finalGain = 2.2;
                        const boostedBuffer = await amplifyAudioBuffer(procCtx, audioBuffer, finalGain);
                        const wavBlob = audioBufferToWav(boostedBuffer);
                        const url = URL.createObjectURL(wavBlob);
                        
                        // Preview & download link
                        audioPreview.src = url;
                        ttsDownloadBtn.href = url;
                        ttsDownloadBtn.download = `suara_super_${Date.now()}.wav`;
                        downloadArea.style.display = 'block';
                        ttsStatus.innerText = "✅ Suara SUPER KERAS berhasil! Coba preview dan rasakan volumenya.";
                        generateTTSBtn.disabled = false;
                        stream.getTracks().forEach(t => t.stop());
                        procCtx.close();
                        audioCtx.close();
                        resolve();
                    };
                });
                
                mediaRecorder.start();
                const utter = new SpeechSynthesisUtterance(txt);
                utter.lang = 'id-ID';
                utter.rate = 0.95;
                utter.volume = 1;
                utter.onend = () => {
                    setTimeout(() => {
                        if (mediaRecorder.state === 'recording') mediaRecorder.stop();
                    }, 700);
                };
                window.speechSynthesis.speak(utter);
                await recordingDone;
            } catch (err) {
                console.error(err);
                ttsStatus.innerText = "❌ Izin microphone diperlukan!";
                generateTTSBtn.disabled = false;
                alert("Harap izinkan akses mikrofon untuk merekam suara TTS.");
            }
        };
        
        // ========== PROSES VIDEO + AUDIO DENGAN GAIN FINAL SANGAT TINGGI ==========
        processBtn.onclick = async () => {
            if (!selectedVideo || !selectedAudio) return;
            processBtn.disabled = true;
            processBtn.innerText = "🔄 Memproses video & audio (volume boost final)...";
            
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            const videoElem = document.createElement('video');
            const videoUrl = URL.createObjectURL(selectedVideo);
            videoElem.src = videoUrl;
            videoElem.muted = true;
            videoElem.crossOrigin = "anonymous";
            
            await new Promise((resolve) => {
                videoElem.onloadedmetadata = () => resolve();
                videoElem.load();
            });
            await videoElem.play();
            
            canvas.width = videoElem.videoWidth;
            canvas.height = videoElem.videoHeight;
            
            // Audio processing dengan gain yang sangat agresif
            const audioUrl = URL.createObjectURL(selectedAudio);
            const audioElement = new Audio(audioUrl);
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            await audioCtx.resume();
            const track = audioCtx.createMediaElementSource(audioElement);
            const finalGainNode = audioCtx.createGain();
            const finalBoost = parseFloat(finalVolumeBoost.value);
            finalGainNode.gain.value = finalBoost;   // massive boost
            track.connect(finalGainNode);
            const destStream = audioCtx.createMediaStreamDestination();
            finalGainNode.connect(destStream);
            
            // Video stream dari canvas
            const videoStream = canvas.captureStream(30);
            const combinedStream = new MediaStream([...videoStream.getVideoTracks(), ...destStream.stream.getAudioTracks()]);
            
            let mimeType = 'video/mp4';
            if (!MediaRecorder.isTypeSupported('video/mp4')) mimeType = 'video/webm';
            const recorder = new MediaRecorder(combinedStream, { mimeType });
            const finalChunks = [];
            
            recorder.ondataavailable = e => finalChunks.push(e.data);
            recorder.onstop = () => {
                const finalBlob = new Blob(finalChunks, { type: mimeType });
                const finalUrl = URL.createObjectURL(finalBlob);
                const outputVideo = document.getElementById('outputVideo');
                outputVideo.src = finalUrl;
                const finalDownload = document.getElementById('finalDownload');
                finalDownload.href = finalUrl;
                finalDownload.download = `video_keras_${Date.now()}.${mimeType === 'video/mp4' ? 'mp4' : 'webm'}`;
                document.getElementById('finalOutput').style.display = 'block';
                processBtn.innerText = "✅ Video final siap! Suara sudah sangat keras.";
                processBtn.disabled = false;
                URL.revokeObjectURL(videoUrl);
                URL.revokeObjectURL(audioUrl);
                audioCtx.close();
            };
            
            recorder.start();
            audioElement.play().catch(e => console.log("Audio play error:", e));
            
            let animFrame;
            const drawLoop = () => {
                if (videoElem.ended || videoElem.paused) {
                    cancelAnimationFrame(animFrame);
                    if (recorder.state === 'recording') recorder.stop();
                    return;
                }
                ctx.drawImage(videoElem, 0, 0, canvas.width, canvas.height);
                const overlay = document.getElementById('overlayText').value;
                if (overlay && overlay.trim()) {
                    ctx.font = `bold ${Math.max(28, canvas.height * 0.07)}px "Segoe UI", system-ui`;
                    ctx.fillStyle = "#FFFFFF";
                    ctx.shadowColor = "black";
                    ctx.shadowBlur = 12;
                    ctx.textAlign = "center";
                    ctx.fillText(overlay, canvas.width / 2, canvas.height * 0.85);
                    ctx.shadowBlur = 0;
                }
                animFrame = requestAnimationFrame(drawLoop);
            };
            drawLoop();
            
            videoElem.onended = () => {
                setTimeout(() => {
                    if (recorder.state === 'recording') recorder.stop();
                }, 300);
            };
        };
        
        // Additional fix: ketika preview audio TTS tidak terdengar karena autoplay policy? 
        // tapi audio preview pakai <audio controls>, user harus klik play. itu normal.
        // Tapi issue sebelumnya: "suara saat digenerate terdengar tapi preview hasil tidak terdengar"
        // Kami pastikan output blob WAV memiliki data audio yang valid. Testing: fungsi amplifyAudioBuffer dan audioBufferToWav sudah baku.
        // Untuk memastikan preview bisa diputar, kita set audio preview dengan blob URL yang benar.
        // Juga pada proses video, gain node memastikan output audio terdengar.
        
        // Tambahan tombol reset atau panduan
        const infoNote = document.createElement('div');
        infoNote.className = 'note';
        infoNote.innerHTML = '📌 Pastikan volume HP maksimal. Gain TTS bisa diatur di slider. Untuk hasil terbaik, gunakan headset saat cek preview suara. Kamera belakang mendukung rekam video langsung.';
        document.querySelector('.container').appendChild(infoNote);
    })();
</script>
</body>
</html>
