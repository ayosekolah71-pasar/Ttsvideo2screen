<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Video Editor Pro - Fixed Version</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, 'Segoe UI', sans-serif; background: #0a0f1e; color: white; display: flex; justify-content: center; padding: 16px; margin: 0; }
        .container { background: #1a1f2e; padding: 20px; border-radius: 28px; width: 100%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #00e5ff; margin: 0; }
        .sub { text-align: center; font-size: 12px; color: #88aaff; margin-bottom: 20px; }
        .label { font-weight: 600; margin: 12px 0 5px; font-size: 14px; color: #b9e6ff; }
        input[type="file"], textarea, select { width: 100%; border-radius: 16px; padding: 12px; background: #10131f; border: 1px solid #333; color: white; margin-bottom: 10px; }
        button { width: 100%; padding: 14px; background: #00e5ff; border: none; border-radius: 50px; font-weight: bold; font-size: 16px; color: #000; margin-top: 10px; cursor: pointer; }
        button:disabled { background: #555; opacity: 0.6; }
        .status { background: #0e1120; border-radius: 20px; padding: 10px; text-align: center; font-size: 12px; margin: 15px 0; border-left: 3px solid #00e5ff; }
        .row { display: flex; gap: 10px; margin: 10px 0; }
        .row button { margin: 0; flex: 1; background: #252c40; color: white; font-size: 13px; }
        .row button.active { background: #00e5ff; color: #000; }
        .timeline-bar { background: #2a2f40; height: 40px; border-radius: 10px; position: relative; margin-bottom: 10px; overflow: hidden; }
        .clip-item { position: absolute; height: 100%; background: #22c55e; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; border-radius: 8px; }
        .video-progress { position: absolute; width: 2px; height: 100%; background: #ffaa33; z-index: 10; }
        #outputArea { display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
        video { width: 100%; border-radius: 15px; background: #000; }
        .download-btn { display: block; width: 100%; background: #22c55e; text-align: center; padding: 15px; border-radius: 50px; text-decoration: none; color: white; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎬 Video Editor Pro</h2>
    <div class="sub">Sudah Diperbaiki - Siap WhatsApp</div>

    <div class="label">📹 Pilih Video</div>
    <input type="file" id="videoInput" accept="video/*">
    
    <div id="previewArea" style="display:none;">
        <video id="previewVideo" muted playsinline></video>
        <div class="row">
            <button id="playPreview">▶ Play/Pause</button>
            <span id="timeDisplay" style="font-size:12px; align-self:center;">0s / 0s</span>
        </div>
    </div>

    <div class="label">🗣️ Teks Suara (TTS)</div>
    <textarea id="ttsText" rows="2" placeholder="Ketik kata-kata di sini..."></textarea>
    <button id="generateTTSBtn">🎤 Buat Suara TTS</button>
    <div id="ttsStatus" class="status">TTS belum dibuat</div>

    <div class="label">✏️ Teks di Layar</div>
    <textarea id="overlayText" placeholder="Teks yang muncul di video..."></textarea>
    <div class="row">
        <button id="posTop" class="active">Atas</button>
        <button id="posMid">Tengah</button>
        <button id="posBottom">Bawah</button>
    </div>

    <div class="label">🎚️ Timeline (Durasi)</div>
    <div class="timeline-bar">
        <div id="videoProgress" class="video-progress"></div>
        <div id="audioClipDisplay" class="clip-item" style="width: 100%; display:none;">SUARA</div>
    </div>

    <button id="processBtn" style="background:#ffaa33;" disabled>✨ PRODUKSI VIDEO (MP4) ✨</button>
    <div id="infoStatus" class="status">Pilih video & buat TTS dulu.</div>

    <div id="outputArea">
        <video id="outputVideo" controls></video>
        <a id="downloadLink" class="download-btn">💾 SIMPAN KE GALERI (WA)</a>
    </div>
</div>

<canvas id="mainCanvas" style="display:none;"></canvas>

<script>
    (function() {
        // Elements
        const videoInput = document.getElementById('videoInput');
        const previewVideo = document.getElementById('previewVideo');
        const previewArea = document.getElementById('previewArea');
        const ttsText = document.getElementById('ttsText');
        const generateTTSBtn = document.getElementById('generateTTSBtn');
        const ttsStatus = document.getElementById('ttsStatus');
        const overlayText = document.getElementById('overlayText');
        const processBtn = document.getElementById('processBtn');
        const infoStatus = document.getElementById('infoStatus');
        const outputArea = document.getElementById('outputArea');
        const outputVideo = document.getElementById('outputVideo');
        const downloadLink = document.getElementById('downloadLink');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        let selectedVideoFile = null;
        let selectedAudioBlob = null;
        let videoDuration = 0;
        let textPos = 'top';

        // 1. Ganti Posisi Teks
        document.getElementById('posTop').onclick = () => { textPos = 'top'; setActivePos('posTop'); };
        document.getElementById('posMid').onclick = () => { textPos = 'middle'; setActivePos('posMid'); };
        document.getElementById('posBottom').onclick = () => { textPos = 'bottom'; setActivePos('posBottom'); };
        
        function setActivePos(id) {
            ['posTop', 'posMid', 'posBottom'].forEach(btn => document.getElementById(btn).classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // 2. Pilih Video
        videoInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            selectedVideoFile = file;
            const url = URL.createObjectURL(file);
            previewVideo.src = url;
            previewArea.style.display = 'block';
            previewVideo.onloadedmetadata = () => {
                videoDuration = previewVideo.duration;
                document.getElementById('timeDisplay').innerText = `0s / ${videoDuration.toFixed(1)}s`;
                checkReady();
            };
        };

        // 3. Play Preview
        document.getElementById('playPreview').onclick = () => {
            previewVideo.paused ? previewVideo.play() : previewVideo.pause();
        };
        previewVideo.ontimeupdate = () => {
            const pct = (previewVideo.currentTime / videoDuration) * 100;
            document.getElementById('videoProgress').style.left = pct + '%';
        };

        // 4. Generate TTS (Metode Recording untuk Metadata Jelas)
        generateTTSBtn.onclick = async () => {
            const txt = ttsText.value.trim();
            if (!txt) { alert("Isi teks TTS dulu"); return; }
            
            generateTTSBtn.disabled = true;
            ttsStatus.innerText = "🎤 Sedang merekam suara...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                
                recorder.ondataavailable = e => chunks.push(e.data);
                
                const utter = new SpeechSynthesisUtterance(txt);
                utter.lang = 'id-ID';
                utter.rate = 1.0;

                utter.onstart = () => recorder.start();
                utter.onend = () => {
                    setTimeout(() => {
                        recorder.stop();
                        stream.getTracks().forEach(t => t.stop());
                    }, 500);
                };

                recorder.onstop = () => {
                    selectedAudioBlob = new Blob(chunks, { type: 'audio/mp3' });
                    document.getElementById('audioClipDisplay').style.display = 'flex';
                    ttsStatus.innerText = "✅ Suara siap!";
                    generateTTSBtn.disabled = false;
                    checkReady();
                };

                window.speechSynthesis.speak(utter);
            } catch (err) {
                alert("Izin Mic diperlukan untuk merekam TTS: " + err);
                generateTTSBtn.disabled = false;
            }
        };

        function checkReady() {
            if (selectedVideoFile && selectedAudioBlob) {
                processBtn.disabled = false;
                infoStatus.innerText = "✨ Siap diproduksi!";
            }
        }

        // 5. Produksi Video (MP4)
        processBtn.onclick = async () => {
            infoStatus.innerText = "🔄 Memproses Video MP4... Mohon tunggu.";
            processBtn.disabled = true;

            const vElem = document.createElement('video');
            vElem.src = URL.createObjectURL(selectedVideoFile);
            vElem.muted = true;
            await vElem.play();

            canvas.width = vElem.videoWidth;
            canvas.height = vElem.videoHeight;
            
            const stream = canvas.captureStream(25);
            const audioCtx = new AudioContext();
            const audioSource = audioCtx.createMediaElementSource(new Audio(URL.createObjectURL(selectedAudioBlob)));
            const dest = audioCtx.createMediaStreamDestination();
            audioSource.connect(dest);
            
            const combined = new MediaStream([...stream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
            
            // Setting agar MP4 kompatibel WA
            let mimeType = 'video/mp4;codecs=avc1';
            if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';

            const recorder = new MediaRecorder(combined, { mimeType, videoBitsPerSecond: 2500000 });
            const finalChunks = [];
            
            recorder.ondataavailable = e => finalChunks.push(e.data);
            recorder.start();

            audioSource.mediaElement.play();

            const draw = () => {
                if (vElem.ended || vElem.paused) {
                    recorder.stop();
                    return;
                }
                ctx.drawImage(vElem, 0, 0, canvas.width, canvas.height);
                
                // Draw Text
                const txt = overlayText.value;
                if (txt) {
                    ctx.fillStyle = "white";
                    ctx.font = `bold ${canvas.height * 0.08}px sans-serif`;
                    ctx.textAlign = "center";
                    ctx.shadowColor = "black"; ctx.shadowBlur = 8;
                    let y = 60;
                    if (textPos === 'middle') y = canvas.height / 2;
                    if (textPos === 'bottom') y = canvas.height - 60;
                    ctx.fillText(txt, canvas.width / 2, y);
                }
                requestAnimationFrame(draw);
            };
            draw();

            recorder.onstop = () => {
                const finalBlob = new Blob(finalChunks, { type: mimeType });
                const finalUrl = URL.createObjectURL(finalBlob);
                outputVideo.src = finalUrl;
                downloadLink.href = finalUrl;
                downloadLink.download = "video_siap_wa.mp4";
                outputArea.style.display = 'block';
                infoStatus.innerText = "✅ BERHASIL! Klik tombol hijau.";
                processBtn.disabled = false;
            };
        };
    })();
</script>
</body>
</html>
