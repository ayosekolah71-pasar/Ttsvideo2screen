<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TTS Pro - Suara Jawa, Anak, Berita & Share WA</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: linear-gradient(145deg, #0b1120 0%, #0f172a 100%); color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; margin: 0; }
        .card { background: rgba(30, 41, 59, 0.9); padding: 24px 22px; border-radius: 2rem; width: 100%; max-width: 560px; box-shadow: 0 25px 40px -10px rgba(0,0,0,0.6); border: 1px solid #334155; }
        h2 { text-align: center; font-size: 1.65rem; font-weight: 800; background: linear-gradient(to right, #38bdf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 4px 0; }
        .subtitle { text-align: center; color: #94a3b8; font-size: 0.85rem; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
        textarea { width: 100%; border: 2px solid #334155; border-radius: 1.2rem; padding: 14px 16px; background: #0f172a; color: #f8fafc; font-size: 0.95rem; line-height: 1.5; resize: none; outline: none; transition: 0.2s; }
        textarea:focus { border-color: #38bdf8; box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15); }
        select { width: 100%; border: 2px solid #334155; border-radius: 1rem; padding: 12px 16px; background: #0f172a; color: #f8fafc; font-size: 0.95rem; font-weight: 500; outline: none; cursor: pointer; transition: 0.2s; -webkit-appearance: none; }
        select:focus { border-color: #c084fc; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 1rem; font-size: 1rem; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; margin-bottom: 12px; }
        .btn-primary { background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%); color: #0f172a; box-shadow: 0 10px 20px -5px rgba(56,189,248,0.4); }
        .btn-primary:disabled { background: #334155; color: #64748b; box-shadow: none; cursor: not-allowed; }
        #status { text-align: center; padding: 12px; border-radius: 1rem; font-size: 0.9rem; font-weight: 600; display: none; margin: 15px 0; border-left: 4px solid transparent; }
        .success { background: rgba(22, 163, 74, 0.15); color: #4ade80; border-left-color: #22c55e !important; }
        .recording { background: rgba(220, 38, 38, 0.15); color: #f87171; border-left-color: #ef4444 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        #downloadArea { display: none; margin-top: 20px; padding-top: 20px; border-top: 2px dashed #334155; }
        audio { width: 100%; margin-bottom: 15px; border-radius: 50px; }
        .btn-wa { background: #25d366; color: white; box-shadow: 0 10px 20px -5px rgba(37,211,102,0.4); }
    </style>
</head>
<body>
<div class="card">
    <h2>🎙️ TTS Nusantara Pro</h2>
    <div class="subtitle">Ubah Tulisan Menjadi Suara Logat & Simpan File Audio</div>
    <div class="form-group">
        <label>Teks Narasi Tulisan</label>
        <textarea id="textInput" rows="3" placeholder="Ketik kalimat atau materi teks di sini..."></textarea>
    </div>
    <div class="form-group">
        <label>Gaya & Karakter Suara</label>
        <select id="voiceStyle">
            <option value="wanita">👩 Suara Wanita (Natural Indonesia)</option>
            <option value="pria">👨 Suara Pria (Natural Indonesia)</option>
            <option value="anak">🧒 Suara Anak Kecil (Lucu & Imut)</option>
            <option value="jawa">🌾 Logat Jawa (Medok Khas)</option>
            <option value="berita">📺 Pembaca Berita (Formal)</option>
        </select>
    </div>
    <button id="recordBtn" class="btn btn-primary">🔊 MULAI REKAM SUARA (TTS)</button>
    <div id="status"></div>
    <div id="downloadArea">
        <label>🎵 Hasil Putar Audio</label>
        <audio id="audioPlayback" controls></audio>
        <button id="shareWABtn" class="btn btn-wa">📲 Bagikan ke WhatsApp</button>
    </div>
</div>
<script>
    (function() {
        const textInput = document.getElementById('textInput');
        const voiceStyle = document.getElementById('voiceStyle');
        const recordBtn = document.getElementById('recordBtn');
        const statusDiv = document.getElementById('status');
        const downloadArea = document.getElementById('downloadArea');
        const audioPlayback = document.getElementById('audioPlayback');
        const shareWABtn = document.getElementById('shareWABtn');
        
        let availableVoices = [];
        let mediaRecorder = null;
        let audioStream = null;
        let lastAudioBlob = null;

        function loadVoices() {
            return new Promise((resolve) => {
                let voices = window.speechSynthesis.getVoices();
                if (voices.length) resolve(voices);
                else window.speechSynthesis.onvoiceschanged = () => resolve(window.speechSynthesis.getVoices());
            });
        }
        async function init() { availableVoices = await loadVoices(); }
        init();

        recordBtn.onclick = async () => {
            const txt = textInput.value.trim();
            if(!txt) { alert("Masukkan teks terlebih dahulu!"); return; }
            
            statusDiv.style.display = 'block';
            statusDiv.className = "recording";
            statusDiv.innerText = "🎤 Sedang merekam sistem suara TTS...";
            recordBtn.disabled = true;

            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const chunks = [];
                mediaRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm' });
                
                mediaRecorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    lastAudioBlob = new Blob(chunks, { type: 'audio/wav' });
                    audioPlayback.src = URL.createObjectURL(lastAudioBlob);
                    downloadArea.style.display = 'block';
                    statusDiv.className = "success";
                    statusDiv.innerText = "✅ Rekaman berhasil disimpan!";
                    recordBtn.disabled = false;
                    if(audioStream) audioStream.getTracks().forEach(t => t.stop());
                };

                const utterance = new SpeechSynthesisUtterance(txt);
                utterance.lang = 'id-ID';
                const style = voiceStyle.value;
                if (style === "wanita") { utterance.pitch = 1.1; utterance.rate = 0.95; }
                else if (style === "pria") { utterance.pitch = 0.75; utterance.rate = 0.92; }
                else if (style === "anak") { utterance.pitch = 1.55; utterance.rate = 1.05; }
                else if (style === "jawa") { utterance.pitch = 0.8; utterance.rate = 0.85; }
                else if (style === "berita") { utterance.pitch = 0.98; utterance.rate = 0.92; }

                let indo = availableVoices.filter(v => v.lang.includes('id'));
                if(indo.length) utterance.voice = indo[0];

                let recStarted = false;
                utterance.onstart = () => { if(!recStarted) { mediaRecorder.start(100); recStarted = true; } };
                utterance.onend = () => { setTimeout(() => { if(mediaRecorder.state === 'recording') mediaRecorder.stop(); }, 500); };
                
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            } catch(e) {
                alert("Izin mic dibutuhkan untuk merekam internal audio TTS.");
                recordBtn.disabled = false;
                statusDiv.style.display = 'none';
            }
        };

        shareWABtn.onclick = () => {
            if(!lastAudioBlob) return;
            alert("File audio siap dibagikan! Silakan simpan / kirimkan rekaman lewat WhatsApp Anda.");
        };
    })();
</script>
</body>
</html>
